name: R-Squared Trading Bot

on:
  schedule:
    # GitHub cron uses UTC.
    # 09:00 UTC = 02:30 PM IST.
    # We start early so the workflow is already running before 03:00 PM IST.
    # If GitHub starts it late, it will still send the message anyhow.
    - cron: "0 9 * * 1-5"

  workflow_dispatch:
    inputs:
      run_now:
        description: "Run both scanners immediately without waiting for 3 PM IST"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: r-squared-trading-bot
  cancel-in-progress: false

jobs:
  run-scanners:
    name: Run R-Squared Scanners
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TZ: Asia/Kolkata
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait until 3:00 PM IST for scheduled run
        if: ${{ github.event_name == 'schedule' || inputs.run_now != true }}
        shell: bash
        run: |
          python3 - << 'EOF'
          import time
          from datetime import datetime, timezone, timedelta

          ist = timezone(timedelta(hours=5, minutes=30))
          target_minutes = 15 * 60  # 03:00 PM IST

          while True:
              now = datetime.now(ist)
              current_minutes = now.hour * 60 + now.minute
              print(f"Current IST time: {now.strftime('%Y-%m-%d %H:%M:%S')}", flush=True)

              if current_minutes >= target_minutes:
                  if current_minutes > target_minutes:
                      print("Workflow is late, but running anyhow as requested.", flush=True)
                  else:
                      print("Reached 03:00 PM IST. Running Index Scanner now.", flush=True)
                  break

              seconds_left = (target_minutes - current_minutes) * 60 - now.second
              sleep_seconds = max(min(seconds_left, 30), 1)
              print(f"Waiting {sleep_seconds} seconds for 03:00 PM IST.", flush=True)
              time.sleep(sleep_seconds)
          EOF

      - name: Run Index Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python index_scanner.py

      - name: Wait until 3:05 PM IST for Stock Scanner
        if: ${{ github.event_name == 'schedule' || inputs.run_now != true }}
        shell: bash
        run: |
          python3 - << 'EOF'
          import time
          from datetime import datetime, timezone, timedelta

          ist = timezone(timedelta(hours=5, minutes=30))
          target_minutes = 15 * 60 + 5  # 03:05 PM IST

          while True:
              now = datetime.now(ist)
              current_minutes = now.hour * 60 + now.minute
              print(f"Current IST time: {now.strftime('%Y-%m-%d %H:%M:%S')}", flush=True)

              if current_minutes >= target_minutes:
                  if current_minutes > target_minutes:
                      print("Stock Scanner is late, but running anyhow as requested.", flush=True)
                  else:
                      print("Reached 03:05 PM IST. Running Stock Scanner now.", flush=True)
                  break

              seconds_left = (target_minutes - current_minutes) * 60 - now.second
              sleep_seconds = max(min(seconds_left, 30), 1)
              print(f"Waiting {sleep_seconds} seconds for 03:05 PM IST.", flush=True)
              time.sleep(sleep_seconds)
          EOF

      - name: Run Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsquared_scanner.py
