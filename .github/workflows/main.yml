name: R-Squared Trading Bot

on:
  schedule:
    # 9:40 UTC is 3:10 PM IST (Runs the Index Sector Scan)
    - cron: '20 9 * * 1-5'
    # 9:45 UTC is 3:15 PM IST (Runs the Stock Scan)
    - cron: '25 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-index-bot:
    # We only run this job exactly at 9:40 UTC (or if triggered manually)
    if: github.event.schedule == '20 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Index Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python index_scanner.py

  run-stock-bot:
    # We only run this job exactly at 9:45 UTC (or if triggered manually)
    if: github.event.schedule == '25 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsquared_scanner.py
